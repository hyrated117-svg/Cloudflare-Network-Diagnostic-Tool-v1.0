name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  swift-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build SwiftUI App
        run: |
          xcodebuild -scheme GeneratedApp -configuration Release -derivedDataPath build
      
      - name: Run Swift Tests
        run: |
          xcodebuild -scheme GeneratedApp -configuration Debug test -derivedDataPath build

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install flake8 pylint pytest
      
      - name: Lint with flake8
        run: |
          flake8 server/ --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Run Python tests
        run: |
          pytest server/ -v

  node-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd installers && npm install
      
      - name: Lint with ESLint
        run: |
          cd installers && npm run lint
