name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Generate changelog
        run: |
          echo "# Release ${{ github.ref_name }}" > release_notes.md
          git log --oneline $(git describe --tags --abbrev=0)..HEAD >> release_notes.md
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release_notes.md
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-artifacts:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v3
      
      - name: Create distribution packages
        run: |
          mkdir -p release/v${{ github.ref_name }}/
          tar -czf release/v${{ github.ref_name }}/mcp-installer-pack.tar.gz installers/ server/ docs/
      
      - name: Generate checksums
        run: |
          cd release/v${{ github.ref_name }}/
          sha256sum mcp-installer-pack.tar.gz > SHA256SUMS
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: release-artifacts
          path: release/
